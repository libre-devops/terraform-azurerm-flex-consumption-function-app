misconfigurations:
  - id: AVD-AZU-0012
    statement: >-
      The module's created storage accounts carry no network rules by default, deliberately, and
      this is not fixable with IP rules: locking the account to default Deny with the app's own
      possible outbound IPs allow-listed breaks both the deployment service (Kudu 403 uploading
      the package) and the running host (503), verified live, because flex consumption reaches its
      storage from platform ranges rather than the published outbound IPs. The working lockdown is
      VNet integration plus service endpoints or private endpoints, which is caller topology and
      expressible through the per-app storage_network_rules input.
  - id: AVD-AZU-0060
    statement: >-
      Customer-managed keys are a deliberate non-goal for function deployment package storage;
      platform-managed keys plus the module's default infrastructure encryption (double
      encryption) are the accepted posture.
  - id: AVD-AZU-0057
    statement: >-
      Classic Storage Analytics logging is superseded by diagnostic settings, which belong to the
      caller's observability topology (the diagnostic-settings module) rather than inside this
      module.
